<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>newCAS — End-to-End Tests</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #0f0f12;
            color: #c9d1d9;
            padding: 2rem;
            min-height: 100vh;
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 1.6rem;
            font-weight: normal;
            color: #e6edf3;
            margin-bottom: 0.3rem;
            letter-spacing: 0.03em;
        }

        .subtitle { color: #6e7681; font-size: 0.85rem; margin-bottom: 2rem; }

        /* ── Loading panel ─────────────────────────────────────────────────── */
        #loading-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 2rem;
            max-width: 540px;
        }

        #loading-panel h2 {
            font-family: Georgia, serif;
            font-weight: normal;
            font-size: 1.2rem;
            color: #e6edf3;
            margin-bottom: 1.2rem;
        }

        .stage-line {
            font-size: 0.85rem;
            padding: 0.3rem 0;
            border-left: 3px solid #21262d;
            padding-left: 0.8rem;
            margin-bottom: 0.3rem;
            color: #8b949e;
            transition: color 0.2s, border-color 0.2s;
        }

        .stage-line.done   { color: #56d364; border-color: #2ea043; }
        .stage-line.active { color: #79c0ff; border-color: #388bfd; }
        .stage-line.error  { color: #f85149; border-color: #da3633; }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Main content ──────────────────────────────────────────────────── */
        #main { display: none; }

        #summary {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            padding: 0.9rem 1.2rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        #summary .stat { display: flex; align-items: center; gap: 0.5rem; }
        #summary .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-pass  { background: #2ea043; }
        .dot-fail  { background: #f85149; }
        .dot-warn  { background: #d29922; }
        #summary strong { font-size: 1.1rem; }

        #progress-bar {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ea043, #26a641);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        /* ── Suite ─────────────────────────────────────────────────────────── */
        .suite {
            margin-bottom: 2rem;
            border: 1px solid #21262d;
            border-radius: 8px;
            overflow: hidden;
        }

        .suite-header {
            background: #161b22;
            padding: 0.7rem 1.2rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8b949e;
            border-bottom: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suite-badge {
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            background: #21262d;
            color: #8b949e;
        }

        /* ── Test rows ─────────────────────────────────────────────────────── */
        /* 4 columns: icon | input+python | check desc | result */
        .test-row {
            display: grid;
            grid-template-columns: 22px minmax(0,1.4fr) minmax(0,1fr) minmax(0,1.4fr);
            padding: 0.6rem 1.2rem;
            border-bottom: 1px solid #161b22;
            font-size: 0.82rem;
            align-items: start;
            gap: 0.5rem;
            transition: background 0.1s;
        }

        .test-row:last-child { border-bottom: none; }
        .test-row:hover { background: #161b22; }

        .col-header {
            font-size: 0.72rem;
            color: #3d444d;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .col-icon { padding-top: 2px; }
        .pass  .col-icon::before { content: "✓"; color: #2ea043; }
        .fail  .col-icon::before { content: "✗"; color: #f85149; }
        .warn  .col-icon::before { content: "⚠"; color: #d29922; }
        .pend  .col-icon::before { content: "·"; color: #3d444d; }

        .col-input strong {
            display: block;
            color: #79c0ff;
            font-size: 0.88rem;
            margin-bottom: 3px;
        }

        .col-input .desc-text {
            color: #8b949e;
            font-size: 0.78rem;
            margin-bottom: 4px;
        }

        .col-input .python-code {
            color: #3d444d;
            font-size: 0.72rem;
            background: #0d1117;
            padding: 2px 5px;
            border-radius: 3px;
            border-left: 2px solid #21262d;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .pass  .col-input .python-code { border-left-color: #2ea043; color: #3fb950; }
        .fail  .col-input .python-code { border-left-color: #f85149; color: #7d2a2a; }
        .warn  .col-input .python-code { border-left-color: #d29922; color: #7d6219; }

        .col-check { color: #6e7681; font-size: 0.78rem; }

        .col-result { font-size: 0.78rem; word-break: break-all; }

        .result-type {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0px 4px;
            border-radius: 3px;
            margin-bottom: 3px;
            border: 1px solid #21262d;
            color: #8b949e;
        }

        .result-latex { color: #56d364; margin: 2px 0; }
        .result-decimal { color: #3d444d; font-size: 0.72rem; }
        .result-error { color: #f85149; }

        .bug-note {
            margin-top: 4px;
            font-size: 0.72rem;
            color: #d29922;
            background: #1c1a0f;
            padding: 4px 6px;
            border-radius: 3px;
            border-left: 2px solid #d29922;
        }

        .warn-row { background: #151208 !important; }

        .pending-row { opacity: 0.35; }
    </style>
</head>
<body>

<!-- Loading panel -->
<div id="loading-panel">
    <h2>⚗️ newCAS End-to-End Testsuite</h2>
    <div id="stage-log"></div>
</div>

<!-- Main content (hidden until ready) -->
<div id="main">
    <h1>newCAS · End-to-End Tests</h1>
    <p class="subtitle">Parser → Transformer → Pyodide → SymPy · Åbn via Live Server fra roden af projektet</p>
    <div id="summary">⏳ Kører tests...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="results"></div>
</div>

<script type="module">
import { parse }        from './src/js/parser.mjs';
import { settings }     from './src/js/settings.js';
import { Transformer }  from './src/js/transformer.js';
import { getFriendlyMessage } from './src/js/error-catalog.js';
import { CASEngine }    from './src/js/cas-engine.js';

// ─── Engine setup ─────────────────────────────────────────────────────────────

const transformer    = new Transformer(settings);
const transformerDeg = new Transformer({ user: { angleMode: 'deg' } });
const transformerRad = new Transformer({ user: { angleMode: 'rad' } });
const engine = new CASEngine(transformer);
let   pyodide     = null;

const stageEl = document.getElementById('stage-log');

function addStage(msg, state = 'active') {
    const el = document.createElement('div');
    el.className = `stage-line ${state}`;
    el.innerHTML = state === 'active'
        ? `<span class="spinner">⟳</span> ${msg}`
        : msg;
    stageEl.appendChild(el);
    return el;
}

async function initEngine() {
    let s;

    s = addStage('Indlæser Pyodide (WebAssembly) — dette kan tage 20-40 sekunder...');
    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.1/full/' });
    s.className = 'stage-line done';
    s.innerHTML = '✓ Pyodide klar';

    s = addStage('Henter SymPy pakke...');
    await pyodide.loadPackage('sympy');
    s.className = 'stage-line done';
    s.innerHTML = '✓ SymPy klar';

    try {
        s = addStage('Loader Python-pakke...');
        // Python-pakken er nu opdelt i flere filer — skriv dem til Pyodide-FS
        const PYTHON_FILES = [
            '__init__.py', 'bootstrap.py',
            'cas_math/__init__.py', 'cas_math/calculus.py',
            'cas_math/registry.py', 'cas_math/statistics.py',
            'core/__init__.py', 'core/context.py', 'core/executor.py', 'core/scope.py',
            'output/__init__.py', 'output/errors.py', 'output/result.py',
            'units/__init__.py', 'units/convert.py', 'units/definitions.py',
        ];
        const CAS_ROOT = '/cas';
        try { pyodide.FS.mkdir(CAS_ROOT); } catch(_) {}
        const subdirs = [...new Set(PYTHON_FILES.filter(f=>f.includes('/')).map(f=>`${CAS_ROOT}/${f.split('/')[0]}`))];
        for (const d of subdirs) { try { pyodide.FS.mkdir(d); } catch(_) {} }

        await Promise.all(PYTHON_FILES.map(async f => {
            const r = await fetch(`src/python/${f}`);
            if (!r.ok) throw new Error(`Kunne ikke hente ${f} (${r.status})`);
            pyodide.FS.writeFile(`${CAS_ROOT}/${f}`, await r.text());
        }));

        await pyodide.runPythonAsync(`
import sys
if '${CAS_ROOT}' not in sys.path:
    sys.path.insert(0, '${CAS_ROOT}')
from bootstrap import run_in_task
import __main__
__main__.run_in_task = run_in_task
`);
        
        s.className = 'stage-line done';
        s.innerHTML = '✓ Python-miljø klar';
    } catch (err) {
        if (s) {
            s.className = 'stage-line error';
            s.innerHTML = `✗ Fejl under Python-opsætning: ${err.message}`;
        }
        throw err;
    }
    addStage('Starter tests...', 'done');
}

// ─── Core runner ──────────────────────────────────────────────────────────────

async function runCAS(input, taskId, xformer = transformer) {
    const ast        = parse(input);
    const pythonCode = xformer.toPython(ast);
    const raw        = await pyodide.runPythonAsync(
        `run_in_task(${JSON.stringify(taskId)}, ${JSON.stringify(pythonCode)})`
    );
    const result = JSON.parse(raw);
    result._python   = pythonCode;   // attach for display
    result._taskId   = taskId;
    return result;
}

// Let the browser repaint between tests
const tick = () => new Promise(r => setTimeout(r, 0));

// ─── Test suites ──────────────────────────────────────────────────────────────
//
// taskId logic (checked in order):
//   1. test.taskId   — explicit override per test
//   2. suite.scopeId — all tests in suite share one scope (for persistence tests)
//   3. auto           — unique s{i}_t{j} so tests don't interfere

const suites = [

  // ── 1 ────────────────────────────────────────────────────────────────────
  {
    name: "Grundlæggende numerisk aritmetik",
    tests: [
      {
        input:  "2 + 3",
        desc:   "2 + 3 = 5",
        checkDesc: "type=scalar, latex='5'",
        check:  r => r.type === 'scalar' && r.latex === '5'
      },
      {
        input:  "10 - 4",
        desc:   "10 - 4 = 6",
        checkDesc: "type=scalar, latex='6'",
        check:  r => r.type === 'scalar' && r.latex === '6'
      },
      {
        input:  "6 * 7",
        desc:   "6 × 7 = 42",
        checkDesc: "type=scalar, latex='42'",
        check:  r => r.type === 'scalar' && r.latex === '42'
      },
      {
        input:  "15 / 3",
        desc:   "15 / 3 = 5 (hel division)",
        checkDesc: "type=scalar, latex='5'",
        check:  r => r.type === 'scalar' && r.latex === '5'
      },
      {
        input:  "2^8",
        desc:   "2^8 = 256",
        checkDesc: "type=scalar, latex='256'",
        check:  r => r.type === 'scalar' && r.latex === '256'
      },
      {
        input:  "-5 + 3",
        desc:   "-5 + 3 = -2",
        checkDesc: "type=scalar, latex='-2'",
        check:  r => r.type === 'scalar' && r.latex === '-2'
      },
      {
        input:  "(2 + 3) * 4",
        desc:   "(2+3) × 4 = 20  (parenteser)",
        checkDesc: "type=scalar, latex='20'",
        check:  r => r.type === 'scalar' && r.latex === '20'
      },
      {
        input:  "3,14 * 2",
        desc:   "3,14 × 2 ≈ 6,28  (komma-decimal)",
        checkDesc: "decimal ≈ 6.28",
        check:  r => r.type === 'scalar' && Math.abs(parseFloat(r.decimal) - 6.28) < 0.001
      },
      {
        input:  "-x^2",
        desc:   "-x^2 = -(x²), ikke (-x)²  (unary/power præcedens)",
        checkDesc: "latex indeholder '-' og 'x^{2}'",
        check:  r => r.type === 'scalar' && r.latex.startsWith('-') && r.latex.includes('x^{2}')
      },
    ]
  },

  // ── 2 ────────────────────────────────────────────────────────────────────
  {
    name: "Symbolsk matematik (auto-symboler og simplificering)",
    tests: [
      {
        input:  "x + x",
        desc:   "x + x → 2x  (auto-symbol x)",
        checkDesc: "latex indeholder '2' og 'x'",
        check:  r => r.type === 'scalar' && r.latex.includes('2') && r.latex.includes('x')
      },
      {
        input:  "x^2 - x^2",
        desc:   "x² - x² → 0",
        checkDesc: "latex='0'",
        check:  r => r.type === 'scalar' && r.latex === '0'
      },
      {
        input:  "factor(x^2 + 2x + 1)",
        desc:   "factor(x²+2x+1) → (x+1)²",
        checkDesc: "latex indeholder 'x + 1'",
        check:  r => r.type === 'scalar' && r.latex.includes('x + 1')
      },
      {
        input:  "expand((x+1)^2)",
        desc:   "expand((x+1)²) → x²+2x+1",
        checkDesc: "latex indeholder 'x^{2}' og '2 x'",
        check:  r => r.type === 'scalar' && r.latex.includes('x^{2}') && r.latex.includes('2 x')
      },
      {
        input:  "simplify(x/x)",
        desc:   "simplify(x/x) → 1",
        checkDesc: "latex='1'",
        check:  r => r.type === 'scalar' && r.latex === '1'
      },
      {
        input:  "diff(x^3; x)",
        desc:   "diff(x³, x) → 3x²",
        checkDesc: "latex indeholder '3' og 'x^{2}'",
        check:  r => r.type === 'scalar' && r.latex.includes('3') && r.latex.includes('x^{2}')
      },
      {
        input:  "integrate(2x; x)",
        desc:   "integrate(2x, x) → x² + C  (ubestemt integral)",
        checkDesc: "latex indeholder 'x^{2}'",
        check:  r => r.type === 'scalar' && r.latex.includes('x^{2}')
      },
    ]
  },

  // ── 3 ────────────────────────────────────────────────────────────────────
  {
    name: "Scope: tildelinger og persistens",
    scopeId: "persist_scope",   // alle tests deler dette task-scope
    tests: [
      {
        input:  "a := 7 ; a + 3",
        desc:   "Tildeling + udtryk i samme celle: a=7, returner a+3=10",
        checkDesc: "latex='10'",
        check:  r => r.type === 'scalar' && r.latex === '10'
      },
      {
        input:  "a^2",
        desc:   "Næste celle: a² = 49  (a=7 fra forrige celle)",
        checkDesc: "latex='49'  (persistens!)",
        check:  r => r.type === 'scalar' && r.latex === '49'
      },
      {
        input:  "b := a + 1 ; b * 2",
        desc:   "b := a+1 = 8, returner b×2 = 16",
        checkDesc: "latex='16'",
        check:  r => r.type === 'scalar' && r.latex === '16'
      },
      {
        input:  "f(t) := t^2 + b ; f(3)",
        desc:   "Funktion med captured variabel b=8: f(3) = 9+8 = 17",
        checkDesc: "latex='17'",
        check:  r => r.type === 'scalar' && r.latex === '17'
      },
    ]
  },

  // ── 4 ────────────────────────────────────────────────────────────────────
  {
    name: "Scope: isolation mellem opgaver",
    tests: [
      {
        input:  "n := 100 ; n",
        taskId: "iso_A",
        desc:   "Opgave A: sæt n=100",
        checkDesc: "latex='100'",
        check:  r => r.type === 'scalar' && r.latex === '100'
      },
      {
        input:  "n := 999 ; n",
        taskId: "iso_B",
        desc:   "Opgave B: sæt n=999  (uafhængigt af A)",
        checkDesc: "latex='999'",
        check:  r => r.type === 'scalar' && r.latex === '999'
      },
      {
        input:  "n",
        taskId: "iso_A",
        desc:   "Tjek A igen: n skal stadig være 100  (ikke 999 fra B)",
        checkDesc: "latex='100'",
        check:  r => r.type === 'scalar' && r.latex === '100'
      },
      {
        input:  "n",
        taskId: "iso_B",
        desc:   "Tjek B igen: n skal stadig være 999",
        checkDesc: "latex='999'",
        check:  r => r.type === 'scalar' && r.latex === '999'
      },
    ]
  },

  // ── 5 ────────────────────────────────────────────────────────────────────
  {
    name: "Funktionsdefinitioner og Lambda",
    tests: [
      {
        input:  "f(x) := x^2 ; f(5)",
        desc:   "f(x) = x², f(5) = 25",
        checkDesc: "latex='25'",
        check:  r => r.type === 'scalar' && r.latex === '25'
      },
      {
        input:  "f(x) := 2x + 1 ; f(0)",
        desc:   "Lineær: f(0) = 1",
        checkDesc: "latex='1'",
        check:  r => r.type === 'scalar' && r.latex === '1'
      },
      {
        input:  "f(x) := x^3 ; f(-2)",
        desc:   "Kubik: f(-2) = -8",
        checkDesc: "latex='-8'",
        check:  r => r.type === 'scalar' && r.latex === '-8'
      },
      {
        input:  "g(x; y) := x^2 + y^2 ; g(3; 4)",
        desc:   "To parametre: g(3,4) = 9+16 = 25",
        checkDesc: "latex='25'",
        check:  r => r.type === 'scalar' && r.latex === '25'
      },
      {
        input:  "h(x) := sqrt(x) ; h(16)",
        desc:   "h(x) = √x, h(16) = 4",
        checkDesc: "latex='4'",
        check:  r => r.type === 'scalar' && r.latex === '4'
      },
    ]
  },

  // ── 6 ────────────────────────────────────────────────────────────────────
  {
    name: "Solve og ligninger",
    tests: [
      {
        input:  "solve(x - 5 = 0; x)",
        desc:   "Simpel ligning: x = 5",
        checkDesc: "type='list', latex indeholder '5'",
        check:  r => r.type === 'list' && r.latex.includes('5')
      },
      {
        input:  "solve(2x + 6 = 0; x)",
        desc:   "Lineær: 2x + 6 = 0 → x = -3",
        checkDesc: "type='list', latex indeholder '-3'",
        check:  r => r.type === 'list' && r.latex.includes('-3')
      },
      {
        input:  "solve(x^2 - 4 = 0; x)",
        desc:   "Andengrads: x = ±2  (to løsninger)",
        checkDesc: "type='list', indeholder '2' og '-2'",
        check:  r => r.type === 'list' && r.latex.includes('2') && r.latex.includes('-2')
      },
      {
        input:  "solve(x^2 + 1 = 0; x)",
        desc:   "Ingen reelle rødder → komplekse løsninger med i",
        checkDesc: "type='list', latex indeholder 'i'",
        check:  r => r.type === 'list' && r.latex.includes('i')
      },
    ]
  },

  // ── 7 ────────────────────────────────────────────────────────────────────
  {
    name: "Statistik",
    tests: [
      {
        input:  "mean({2; 4; 6; 8; 10})",
        desc:   "Middelværdi: mean({2,4,6,8,10}) = 6",
        checkDesc: "decimal = 6",
        check:  r => r.type === 'scalar' && parseFloat(r.decimal) === 6
      },
      {
        input:  "median({1; 3; 5; 7; 9})",
        desc:   "Median (ulige antal, 5 elementer) = 5",
        checkDesc: "latex='5'",
        check:  r => r.type === 'scalar' && r.latex === '5'
      },
      {
        input:  "median({2; 4; 6; 8})",
        desc:   "Median (lige antal, 4 elementer) = (4+6)/2 = 5",
        checkDesc: "decimal = 5",
        check:  r => r.type === 'scalar' && parseFloat(r.decimal) === 5
      },
      {
        input:  "Q1({2; 4; 6; 8; 10; 12})",
        desc:   "Q1 af {2,4,6,8,10,12} = median af [2,4,6] = 4",
        checkDesc: "decimal = 4",
        check:  r => r.type === 'scalar' && parseFloat(r.decimal) === 4
      },
      {
        input:  "Q3({2; 4; 6; 8; 10; 12})",
        desc:   "Q3 af {2,4,6,8,10,12} = median af [8,10,12] = 10",
        checkDesc: "decimal = 10",
        check:  r => r.type === 'scalar' && parseFloat(r.decimal) === 10
      },
      {
        input:  "min({5; 3; 8; 1; 4})",
        desc:   "min({5,3,8,1,4}) = 1",
        checkDesc: "latex='1'",
        check:  r => r.type === 'scalar' && r.latex === '1'
      },
      {
        input:  "max({5; 3; 8; 1; 4})",
        desc:   "max({5,3,8,1,4}) = 8",
        checkDesc: "latex='8'",
        check:  r => r.type === 'scalar' && r.latex === '8'
      },
    ]
  },

  // ── 8 ────────────────────────────────────────────────────────────────────
  {
    name: "Enheder og konvertering",
    tests: [
      {
        input:  "5[m]",
        desc:   "5 meter — skal producere Quantity med meter",
        checkDesc: "type='scalar', decimal indeholder '5'",
        check:  r => r.type === 'scalar' && r.decimal.includes('5')
      },
      ,{
        input:  "5[m] -> [cm]",

// ─── Build flat test queue ────────────────────────────────────────────────────

const testQueue = [];
suites.forEach((suite, si) => {
    suite.tests.forEach((test, ti) => {
        let taskId;
        if (test.taskId)        taskId = test.taskId;
        else if (suite.scopeId) taskId = suite.scopeId;
        else                    taskId = `s${si}_t${ti}`;

        // Tillad per-suite transformer (til trig-tests med grader/radianer)
        const xformer = suite.transformer || transformer;

        testQueue.push({ ...test, taskId, xformer, _suiteIdx: si, _testIdx: ti });
    });
});

// ─── DOM helpers ─────────────────────────────────────────────────────────────

function escHtml(s) {
    return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatResult(r) {
    if (!r) return '<span style="color:#3d444d">—</span>';
    if (r.type === 'error') {
        const code = r.code ? `[${escHtml(r.code)}] ` : '';
        return `<span class="result-error">${code}${escHtml(r.message?.slice(0,80))}</span>`;
    }
    if (r.type === 'warning') {
        const source = r.source ? `<div class="result-decimal">source: ${escHtml(r.source?.slice(0,60))}</div>` : '';
        return `<span class="result-type" style="color:#d29922">warning · COMPLEX_RESULT</span>
                <div class="result-latex">${escHtml(r.latex?.slice(0,60))}</div>${source}`;
    }
    const typeLabel = `<span class="result-type">${escHtml(r.type)}</span>`;
    const latex     = r.latex    ? `<div class="result-latex">${escHtml(r.latex?.slice(0,80))}</div>` : '';
    const decimal   = r.decimal  ? `<div class="result-decimal">≈ ${escHtml(r.decimal?.slice(0,60))}</div>` : '';
    return typeLabel + latex + decimal;
}

// ─── Build suite DOM upfront (all pending) ───────────────────────────────────

const suiteEls  = [];
const rowsByKey = {};   // "si_ti" → { row, badgeEl }

function buildSuiteDOM() {
    const container = document.getElementById('results');

    suites.forEach((suite, si) => {
        const suiteEl = document.createElement('div');
        suiteEl.className = 'suite';

        const header = document.createElement('div');
        header.className = 'suite-header';
        const titleSpan = document.createElement('span');
        titleSpan.textContent = suite.name;
        const badge = document.createElement('span');
        badge.className = 'suite-badge';
        badge.textContent = `${suite.tests.length} tests`;
        header.append(titleSpan, badge);
        suiteEl.appendChild(header);

        // Column headers
        const colHead = document.createElement('div');
        colHead.className = 'test-row';
        colHead.style.background = '#0d1117';
        colHead.innerHTML = `
            <div></div>
            <div class="col-header">CAS input + genereret Python</div>
            <div class="col-header">Forventet</div>
            <div class="col-header">Resultat fra SymPy</div>
        `;
        suiteEl.appendChild(colHead);

        suite.tests.forEach((test, ti) => {
            const row = document.createElement('div');
            row.className = `test-row pend pending-row${test.knownIssue ? ' warn-row' : ''}`;
            row.innerHTML = `
                <div class="col-icon"></div>
                <div class="col-input">
                    <strong>${escHtml(test.input)}</strong>
                    <div class="desc-text">${escHtml(test.desc)}</div>
                    <div class="python-code">⏳ afventer…</div>
                </div>
                <div class="col-check">${escHtml(test.checkDesc)}</div>
                <div class="col-result">—</div>
            `;
            suiteEl.appendChild(row);
            rowsByKey[`${si}_${ti}`] = { row, badge };
        });

        container.appendChild(suiteEl);
        suiteEls.push({ el: suiteEl, badge, suite });
    });
}

function updateRow(si, ti, result, passed, knownIssue) {
    const test = suites[si].tests[ti];
    const { row, badge } = rowsByKey[`${si}_${ti}`];

    const stateClass = knownIssue ? 'warn' : (passed ? 'pass' : 'fail');
    row.className = `test-row ${stateClass}${knownIssue ? ' warn-row' : ''}`;
    row.classList.remove('pending-row');

    const pythonHtml = result?._python
        ? escHtml(result._python.slice(0, 200)) + (result._python.length > 200 ? '…' : '')
        : '(parse fejlede)';

    const bugNoteHtml = test.bugNote
        ? `<div class="bug-note">🔧 ${escHtml(test.bugNote)}</div>`
        : '';

    row.innerHTML = `
        <div class="col-icon"></div>
        <div class="col-input">
            <strong>${escHtml(test.input)}</strong>
            <div class="desc-text">${escHtml(test.desc)}</div>
            <div class="python-code">${pythonHtml}</div>
            ${bugNoteHtml}
        </div>
        <div class="col-check">${escHtml(test.checkDesc)}</div>
        <div class="col-result">${formatResult(result)}</div>
    `;
}

function updateSuiteBadge(si, pass, fail, warn) {
    const { badge } = suiteEls[si];
    const total = pass + fail + warn;
    if (fail > 0) {
        badge.textContent = `${pass}/${total-warn} ✓  ${fail} ✗  ${warn > 0 ? warn + ' ⚠' : ''}`;
        badge.style.color = '#f85149';
    } else {
        badge.textContent = warn > 0
            ? `${pass}/${total-warn} ✓  ${warn} ⚠`
            : `${pass}/${total} ✓`;
        badge.style.color = warn > 0 ? '#d29922' : '#2ea043';
    }
}

// ─── Main runner ──────────────────────────────────────────────────────────────

async function main() {

    // 1. Init Pyodide
    try {
        await initEngine();
    } catch(e) {
        console.error("Engine init failed:", e);
        document.getElementById('summary').innerHTML = 
            `<div class="stat"><div class="dot dot-fail"></div><strong>Kritisk fejl:</strong> Kunne ikke starte CAS-motoren. Se konsollen.</div>`;
        return;
    }

    // 2. Switch from loading panel to main
    document.getElementById('loading-panel').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    // 3. Build pending DOM
    buildSuiteDOM();

    // 4. Run tests
    let totalPass = 0, totalFail = 0, totalWarn = 0;

    const suiteCounts = suites.map(s => ({ pass: 0, fail: 0, warn: 0 }));

    for (const t of testQueue) {
        const { _suiteIdx: si, _testIdx: ti } = t;

        let result, passed;
        try {
            result = await runCAS(t.input, t.taskId, t.xformer);
            passed = t.check(result);
        } catch(e) {
            result = { type: 'error', message: e.message, _python: '(fejl under kørsel)' };
            passed = false;
        }

        const isWarn = !!t.knownIssue;

        if (isWarn) {
            totalWarn++;
            suiteCounts[si].warn++;
        } else if (passed) {
            totalPass++;
            suiteCounts[si].pass++;
        } else {
            totalFail++;
            suiteCounts[si].fail++;
        }

        updateRow(si, ti, result, passed, isWarn);
        updateSuiteBadge(si, suiteCounts[si].pass, suiteCounts[si].fail, suiteCounts[si].warn);

        // Update progress
        const done  = totalPass + totalFail + totalWarn;
        const total = testQueue.length;
        const pct   = Math.round(done / total * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        if (totalFail > 0) {
            document.getElementById('progress-fill').style.background =
                'linear-gradient(90deg, #f85149, #da3633)';
        }

        // Update live summary
        document.getElementById('summary').innerHTML = `
            <div class="stat"><div class="dot dot-pass"></div><strong>${totalPass}</strong> bestået</div>
            <div class="stat"><div class="dot dot-fail"></div><strong>${totalFail}</strong> fejlet</div>
            <div class="stat"><div class="dot dot-warn"></div><strong>${totalWarn}</strong> kendte problemer</div>
            <div class="stat" style="margin-left:auto; color:#6e7681">${done}/${total} · ${pct}%</div>
        `;

        await tick();   // let browser repaint
    }

    // Final summary
    document.getElementById('summary').innerHTML = `
        <div class="stat"><div class="dot dot-pass"></div><strong>${totalPass}</strong> bestået</div>
        <div class="stat"><div class="dot dot-fail"></div><strong>${totalFail}</strong> fejlet</div>
        <div class="stat"><div class="dot dot-warn"></div><strong>${totalWarn}</strong> kendte problemer</div>
        <div class="stat" style="margin-left:auto; color:#6e7681">${testQueue.length} tests kørt</div>
        ${totalFail === 0
            ? '<span style="color:#2ea043; margin-left:1rem">🎉 Alle reelle tests består</span>'
            : `<span style="color:#f85149; margin-left:1rem">⚠ ${totalFail} test(s) fejlede</span>`}
    `;
}

main();
</script>
