<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>newCAS — End-to-End Testsuite</title>
  <style>
    :root { --pass: #16a34a; --fail: #dc2626; --warn: #ca8a04; --bg: #f8fafc; }
    body { font-family: system-ui, sans-serif; background: var(--bg); padding: 2rem; max-width: 900px; margin: auto; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    .status { padding: 0.25rem 0.6rem; border-radius: 4px; font-weight: 600; color: white; }
    .pass { background: var(--pass); } .fail { background: var(--fail); } .warn { background: var(--warn); }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px #0001; }
    th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f1f5f9; font-weight: 600; }
    #log { margin-top: 1rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; color: #334155; background: #e2e8f0; padding: 1rem; border-radius: 6px; min-height: 120px; }
    #summary { margin: 1rem 0; font-size: 1.1rem; font-weight: 500; }
  </style>
</head>
<body>
  <h1>⚗️ newCAS End-to-End Testsuite</h1>
  <div id="summary">Initialiserer...</div>
  <table>
    <thead><tr><th style="width:30px">#</th><th>Test</th><th>Input</th><th>Forventet</th><th>Status</th></tr></thead>
    <tbody id="results"></tbody>
  </table>
  <div id="log">Klar til at starte...</div>

    <script type="module">
    import { CASEngine } from './src/js/cas-engine.js';
    import { Transformer } from './src/js/transformer.js';
    import { settings } from './src/js/settings.js';

    const engine = new CASEngine(new Transformer(settings));
    const resultsEl = document.getElementById('results');
    const logEl = document.getElementById('log');
    const summaryEl = document.getElementById('summary');
    let passed = 0, failed = 0, total = 0;

    function log(msg) { logEl.textContent += msg + '\n'; }

    async function runRawTest(name, inputCode, expected, validator) {
      total++;
      const row = document.createElement('tr');
      const statusId = `s-${total}`;
      
      row.innerHTML = `
        <td>${total}</td>
        <td>${name}</td>
        <td><code>${inputCode.replace(/"/g, '&quot;')}</code></td>
        <td>${expected}</td>
        <td data-status="${statusId}">⏳</td>
      `;
      resultsEl.appendChild(row);

      try {
        const raw = await engine.pyodide.runPythonAsync(
          `run_in_task("e2e_${total}", ${JSON.stringify(inputCode)})`
        );
        const res = JSON.parse(raw);
        const ok = validator(res);
        
        const statusCell = document.querySelector(`[data-status="${statusId}"]`);
        if (statusCell) {
          if (ok) {
            passed++;
            statusCell.innerHTML = '<span class="status pass">✓</span>';
          } else {
            failed++;
            statusCell.innerHTML = '<span class="status fail">✗</span>';
            log(`❌ ${name}\n   Output: ${JSON.stringify(res)}\n`);
          }
        }
      } catch (e) {
        failed++;
        const statusCell = document.querySelector(`[data-status="${statusId}"]`);
        if (statusCell) {
          statusCell.innerHTML = '<span class="status fail">✗</span>';
        }
        log(`❌ EXCEPTION: ${name}\n   ${e.message}\n`);
      }
      // ⚠️ FIX: statusBar → summaryEl
      summaryEl.textContent = `Resultat: ${passed} passed, ${failed} failed af ${total} tests`;
    }

    await engine.init();
    log('✅ Motor initialiseret. Starter tests...');

    // ⚠️ FIX: addTest → runRawTest
    const tests = [
      runRawTest('Basal aritmetik', '2 + 2', '4', r => r.type==='scalar' && (r.decimal==='4.0' || r.decimal==='4')),
      runRawTest('Variabel + persistens', 'a = 5\na * 3', '15', r => r.type==='scalar' && r.decimal==='15.0'),
      runRawTest('Konstanter', 'pi + E', '~5.8599', r => r.type==='scalar' && parseFloat(r.decimal) > 5.8 && parseFloat(r.decimal) < 5.9),
      runRawTest('Trigonometri (deg)', 'sin(90)', '1', r => r.type==='scalar' && r.decimal==='1.0'),
      runRawTest('Løsning af ligning', 'solve(Eq(x**2, 4), x)', '[-2, 2]', r => r.type==='list' && r.decimal.includes('-2') && r.decimal.includes('2')),
      runRawTest('Differentiation', 'diff(x**2, x)', '2x', r => r.type==='scalar' && r.latex.includes('2 x')),
      runRawTest('Bestemt integral', 'integrate(x**2, x, 0, 1)', '1/3', r => r.type==='scalar' && r.decimal.includes('0.333')),
      runRawTest('Grænseværdi', 'limit(sin(x)/x, x, 0)', '1', r => r.type==='scalar' && r.decimal==='1.0'),
      runRawTest('Statistik: mean', 'mean([2, 4, 6, 8])', '5', r => r.type==='scalar' && r.decimal==='5.0'),
      runRawTest('Statistik: median', 'median([1, 2, 5, 7, 9])', '5', r => r.type==='scalar' && r.decimal==='5.0'),
      runRawTest('Enheder: konvertering', '5 * km', '5000 m', r => r.type==='scalar' || r.latex.includes('5000')),
      runRawTest('Enheder: alias [min]', '5 * minute', '5 min', r => r.type==='scalar' || r.latex.toLowerCase().includes('min')),
      runRawTest('Funktion definition', 'f(x) = x**2\nf(4)', '16', r => r.type==='scalar' && r.decimal==='16.0'),
      runRawTest('Kompleks advarsel', 'sqrt(-9)', 'COMPLEX_RESULT', r => r.type==='warning' && r.code==='COMPLEX_RESULT'),
      runRawTest('Division med nul', '1/0', 'ZERO_DIVISION', r => r.type==='error' && r.code==='ZERO_DIVISION'),
      runRawTest('Udefineret variabel', 'udefineret_navn', 'UNDEFINED_NAME', r => r.type==='error' && r.code==='UNDEFINED_NAME'),
      runRawTest('Matrix operation', 'det(Matrix([[1,2],[3,4]]))', '-2', r => r.type==='scalar' && r.decimal==='-2.0'),
      runRawTest('Scope isolation', 'x = 10', 'success', r => r.type==='success'),
    ];

    for (const test of tests) await test;

    log(`\n🏁 Tests afsluttet. ${passed}/${total} passed.`);
    summaryEl.textContent += ` | ${failed > 0 ? '⚠️ Se loggen for detaljer' : '✅ Alle tests passed!'}`;
  </script>
</body>
</html>
